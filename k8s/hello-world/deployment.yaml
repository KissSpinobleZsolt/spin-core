apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          image: ghcr.io/kissspinoblezsolt/spin-core-hello-world:latest
          imagePullPolicy: Always  # Always, not IfNotPresent — manifest defaults to :latest, which nodes cache aggressively; deploy script overrides to SHA at apply time
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
