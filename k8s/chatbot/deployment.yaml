apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
        - name: chatbot
          image: spin-core-chatbot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
