apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/kissspinoblezsolt/spin-core-backend:latest
          imagePullPolicy: Always  # Always, not IfNotPresent — manifest defaults to :latest, which nodes cache aggressively; deploy script overrides to SHA at apply time
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: spin-core-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: JWT_SECRET_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_NAME
            # Cloud LLM provider API keys — stored in spin-core-secrets, not the ConfigMap.
            # Keys are optional; bots using a missing provider return a stream error.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: OPENAI_API_KEY
                  optional: true
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: seed-data
              mountPath: /app/seed-data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/i18n/en
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
        - name: seed-data
          configMap:
            name: seed-data
