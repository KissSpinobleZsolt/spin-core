apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: spin-core-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: spin-core-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: JWT_SECRET_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: ADMIN_NAME
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/i18n/en
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
