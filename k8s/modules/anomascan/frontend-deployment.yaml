apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomascan
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomascan
  template:
    metadata:
      labels:
        app: anomascan
    spec:
      containers:
        - name: anomascan
          image: ghcr.io/kissspinoblezsolt/spin-core-anomascan:latest
          imagePullPolicy: Always  # deploy script overrides to SHA at apply time
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
