apiVersion: v1
kind: Service
metadata:
  name: anomascan-backend  # matches backend_url in manifest.json: http://anomascan-backend:8000
  namespace: spin-core
spec:
  type: ClusterIP  # only accessed by core backend proxy — no external NodePort needed
  selector:
    app: anomascan-backend
  ports:
    - port: 8000
      targetPort: 8000
