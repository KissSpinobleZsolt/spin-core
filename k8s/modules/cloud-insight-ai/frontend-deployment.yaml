apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-insight-ai
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-insight-ai
  template:
    metadata:
      labels:
        app: cloud-insight-ai
    spec:
      containers:
        - name: cloud-insight-ai
          image: ghcr.io/kissspinoblezsolt/spin-core-cloud-insight-ai:latest
          imagePullPolicy: Always  # deploy script overrides to SHA at apply time
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
