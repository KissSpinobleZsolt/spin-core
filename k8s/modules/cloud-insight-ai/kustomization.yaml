apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: spin-core

resources:
  - frontend-deployment.yaml
  - frontend-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml

# Image block allows `kustomize edit set image` to stamp the SHA tag at deploy time.
images:
  - name: ghcr.io/kissspinoblezsolt/spin-core-cloud-insight-ai
    newTag: latest
  - name: ghcr.io/kissspinoblezsolt/spin-core-cloud-insight-ai-backend
    newTag: latest
