apiVersion: v1
kind: Service
metadata:
  name: cloud-insight-ai-backend  # matches backend_url in manifest.json: http://cloud-insight-ai-backend:8000
  namespace: spin-core
spec:
  type: ClusterIP  # only accessed by core backend proxy — no external NodePort needed
  selector:
    app: cloud-insight-ai-backend
  ports:
    - port: 8000
      targetPort: 8000
