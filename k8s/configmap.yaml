apiVersion: v1
kind: ConfigMap
metadata:
  name: spin-core-config
  namespace: spin-core
data:
  SETTINGS_PATH: "/app/data/settings.json"
  SEED_PATH: "/app/seed-data/seed.json"
  POSTGRES_URL: "postgresql://core-postgres:core-postgres@postgres:5432/core-postgres"
  CLICKHOUSE_URL: "clickhouse://core-ch:core-ch@clickhouse:9000/core"
  OLLAMA_URL: "http://ollama.spin-core.svc.cluster.local:11434"
  OLLAMA_MODEL: "qwen2.5:7b"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  MODULE_REGISTRY_URLS: "http://hello-world.spin-core.svc.cluster.local"
  # Cloud LLM provider base URL (optional). Leave empty to use the official OpenAI endpoint.
  # Set to e.g. "https://api.groq.com/openai/v1" for Groq-hosted models.
  OPENAI_BASE_URL: ""
