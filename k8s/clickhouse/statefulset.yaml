apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: spin-core
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spin-core-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              value: core
          ports:
            - containerPort: 8123
            - containerPort: 9000
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            capabilities:
              add: ["SYS_NICE", "NET_ADMIN"]
      volumes:
        - name: clickhouse-data
          persistentVolumeClaim:
            claimName: clickhouse-pvc
