apiVersion: batch/v1
kind: Job
metadata:
  name: model-downloader
  namespace: spin-core
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://ollama:11434/api/tags > /dev/null 2>&1; do
                echo 'waiting for ollama...'; sleep 3;
              done
      containers:
        - name: model-downloader
          image: ollama/ollama:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              until ollama pull qwen2.5:7b; do
                echo '[model-downloader] retrying qwen2.5:7b...'; sleep 5;
              done
              until ollama pull nomic-embed-text:latest; do
                echo '[model-downloader] retrying nomic-embed-text...'; sleep 5;
              done
              echo '[model-downloader] all models ready.'
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
