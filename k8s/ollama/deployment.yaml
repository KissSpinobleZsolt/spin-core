apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          # Start server, wait until ready, pull the model, then keep serving.
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              until ollama list > /dev/null 2>&1; do sleep 1; done
              ollama pull llama3.2:3b
              wait
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
