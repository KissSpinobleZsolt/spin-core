apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: spin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kissspinoblezsolt/spin-core-frontend:latest
          imagePullPolicy: Always  # Always, not IfNotPresent — manifest defaults to :latest, which nodes cache aggressively; deploy script overrides to SHA at apply time
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
