services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core-postgres
      POSTGRES_PASSWORD: core-postgres
      POSTGRES_DB: core-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core-postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: core-mongo
      MONGO_INITDB_ROOT_PASSWORD: core-mongo
      MONGO_INITDB_DATABASE: core-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      SETTINGS_PATH: /app/data/settings.json
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
  mongo_data:
  clickhouse_data:
  app_data:
