services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core-postgres
      POSTGRES_PASSWORD: core-postgres
      POSTGRES_DB: core-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core-postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: core-mongo
      MONGO_INITDB_ROOT_PASSWORD: core-mongo
      MONGO_INITDB_DATABASE: core-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  model-downloader:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama pull llama3.1:8b &&
      ollama pull qwen2.5-coder:1.5b-base &&
      ollama pull nomic-embed-text:latest"
    restart: unless-stopped
    
  ollama:
    image: ollama/ollama
    # Start the server, wait until it accepts requests, pull the model, then keep serving.
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 2; done &&
      ollama pull ${OLLAMA_MODEL:-llama3.2:3b} &&
      wait"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - model-downloader
    restart: unless-stopped

  hello-world:
    build: ./modules/hello-world
    ports:
      - "3001:80"
    restart: unless-stopped

  chatbot:
    build: ./modules/chatbot
    ports:
      - "3002:80"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      SETTINGS_PATH: /app/data/settings.json
      ADMIN_EMAIL: admin@spin.local
      ADMIN_PASSWORD: change-me
      ADMIN_NAME: Admin
      OLLAMA_URL: http://ollama:11434
      CHATBOT_REMOTE_URL: http://localhost:3002/remoteEntry.js
      MODULE_REGISTRY_URLS: http://hello-world,http://chatbot
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CHATBOT_REMOTE_URL: http://localhost:3002/remoteEntry.js
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
  mongo_data:
  clickhouse_data:
  app_data:
  ollama_data:
