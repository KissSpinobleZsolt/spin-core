services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core-postgres
      POSTGRES_PASSWORD: core-postgres
      POSTGRES_DB: core-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core-postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: core-mongo
      MONGO_INITDB_ROOT_PASSWORD: core-mongo
      MONGO_INITDB_DATABASE: core-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  ollama:
    image: ollama/ollama
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  model-downloader:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "until ollama pull qwen2.5:7b; do
         echo '[model-downloader] retrying qwen2.5:7b...'; sleep 5;
       done &&
       until ollama pull nomic-embed-text:latest; do
         echo '[model-downloader] retrying nomic-embed-text...'; sleep 5;
       done &&
       echo '[model-downloader] all models ready.'"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  hello-world:
    build: ./modules/hello-world
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      SETTINGS_PATH: /app/data/settings.json
      ADMIN_EMAIL: admin@spin.local
      ADMIN_PASSWORD: change-me
      ADMIN_NAME: Admin
      OLLAMA_URL: http://ollama:11434
      MODULE_REGISTRY_URLS: http://hello-world
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      hello-world:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      hello-world:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
  mongo_data:
  clickhouse_data:
  app_data:
  ollama_data:
