services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core-postgres
      POSTGRES_PASSWORD: core-postgres
      POSTGRES_DB: core-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core-postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://core-postgres:core-postgres@db:5432/core-postgres
      JWT_SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
