services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core-postgres
      POSTGRES_PASSWORD: core-postgres
      POSTGRES_DB: core-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core-postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  ollama:
    image: ollama/ollama
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  model-downloader:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "until ollama pull qwen2.5:7b; do
         echo '[model-downloader] retrying qwen2.5:7b...'; sleep 5;
       done &&
       until ollama pull nomic-embed-text:latest; do
         echo '[model-downloader] retrying nomic-embed-text...'; sleep 5;
       done &&
       echo '[model-downloader] all models ready.'"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  # ────── Module AnomaScan service BE───────────────────────────────────────
  anomascan-backend:
    build: ./modules/AnomaScan/backend
    ports:
      - "8003:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      POSTGRES_URL: postgresql://core-postgres:core-postgres@postgres:5432/core-postgres
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
      YOLO_MODELS_DIR: /app/vision-models
    volumes:
      - anomascan_yolo_weights:/app/vision-models
    restart: unless-stopped
  # ────── Module AnomaScan service FE
  anomascan:
    build: ./modules/AnomaScan
    ports:
      - "3003:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      anomascan-backend:
        condition: service_started
    restart: unless-stopped

  # ────── Module Cloud Insight AI service FE───────────────────────────────────────
  cloud-insight-ai:
    build: ./modules/cloud-insight-ai
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      cloud-insight-ai-backend:
        condition: service_started
    restart: unless-stopped

 # ────── Module Cloud Insight AI service BE───────────────────────────────────────
  cloud-insight-ai-backend:
    build: ./modules/cloud-insight-ai/backend
    ports:
      - "8002:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      POSTGRES_URL: postgresql://core-postgres:core-postgres@postgres:5432/core-postgres
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: core-ch
      CLICKHOUSE_PASSWORD: core-ch
      CLICKHOUSE_DB: core
    restart: unless-stopped

  bots-trader-platform:
    build: ./modules/bots-trader-platform
    ports:
      - "3004:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      bots-trader-platform-backend:
        condition: service_started
    restart: unless-stopped

  bots-trader-platform-backend:
    build: ./modules/bots-trader-platform/backend
    ports:
      - "8004:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      POSTGRES_URL: postgresql://core-postgres:core-postgres@postgres:5432/core-postgres
      OLLAMA_URL: http://ollama:11434
      CORE_BACKEND_URL: http://backend:8000
      REDDIT_CLIENT_ID: ""
      REDDIT_CLIENT_SECRET: ""
      REDDIT_USER_AGENT: "bots-trader-platform/0.1"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
 # ── Spin Docs module (architecture diagrams + dev docs, system role only) ────────────
  spin-docs:
    build: ./modules/spin-docs
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Core platform ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: change-me-in-production
      SETTINGS_PATH: /app/data/settings.json
      SEED_PATH: /app/seed-data/seed.json
      ADMIN_EMAIL: admin@spin.local
      ADMIN_PASSWORD: change-me
      ADMIN_NAME: Admin
      OLLAMA_URL: http://ollama:11434
      MODULE_REGISTRY_URLS: http://cloud-insight-ai:80,http://anomascan:80,http://bots-trader-platform:80,http://spin-docs:80
      # Cloud LLM providers — leave blank to disable; bots using that provider will
      # return an error chunk instead of streaming tokens.
      # Anthropic Claude: get your key at https://console.anthropic.com/settings/keys
      ANTHROPIC_API_KEY: ""
      # OpenAI or any compatible endpoint (Groq, Mistral, Azure OpenAI, …)
      OPENAI_API_KEY: ""
      # Override the OpenAI base URL for compatible endpoints; leave blank for api.openai.com
      OPENAI_BASE_URL: ""
    volumes:
      - app_data:/app/data
      - ./data:/app/seed-data:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      ollama:
        condition: service_healthy
      spin-docs:
        condition: service_healthy  # spin-docs must be up so its remote_url is reachable on first seed
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    profiles:
      - dev

volumes:
  postgres_data:
  clickhouse_data:
  app_data:
  ollama_data:
  anomascan_yolo_weights:
  frontend_node_modules:
